name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: validate POM structure and compile only (no full tests) ──────
  # The project is in foundation phase; Spring Boot tests require a live
  # Postgres + Redis via Testcontainers which needs Docker-in-Docker.
  # `mvn validate` verifies all pom.xml files resolve without running tests.
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Validate POM structure
        run: mvn validate -B
        working-directory: backend

      - name: Compile (no tests)
        run: mvn compile -B -q
        working-directory: backend

  # ── ML Service: install deps, compile-check, lint ─────────────────────────
  # Heavy ML tests (model training) are skipped in CI foundation phase.
  # pytest --co (collect-only) validates test discovery without running tests.
  ml-service:
    name: ML Service Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: ml-service

      - name: Validate Python syntax (compileall)
        run: python -m compileall app/ -q
        working-directory: ml-service

      - name: Lint with ruff
        run: ruff check app/
        working-directory: ml-service

      - name: Run tests (allow no-model degraded state)
        run: pytest tests/ -v --tb=short
        working-directory: ml-service

  # ── Frontend: install, lint, build ────────────────────────────────────────
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Docker: validate compose config and build all images ──────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build --no-cache
