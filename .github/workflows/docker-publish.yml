name: Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: git sha)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/finpilot-backend
  ML_IMAGE: ghcr.io/${{ github.repository_owner }}/finpilot-ml-service
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/finpilot-frontend

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.image_tag }}" != "" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      # ── Backend ──────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── ML Service ──────────────────────────────────────────
      - name: Build & push ML service
        uses: docker/build-push-action@v6
        with:
          context: ml-service
          push: true
          tags: |
            ${{ env.ML_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.ML_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
