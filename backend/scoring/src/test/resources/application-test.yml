spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///fhss-test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  ml-service:
    url: http://localhost:18000
    http-timeout-seconds: 5
  redis:
    key-prefix: score:test:
    cache-ttl-minutes: 5
    host: localhost
    port: 16379
  decision:
    default-reviewer: test-underwriter
