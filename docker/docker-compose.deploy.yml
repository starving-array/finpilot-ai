x-common-vars: &common-vars
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/fhss}
  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-fhss}
  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
  SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
  SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
  ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}

services:
  postgres:
    image: postgres:16-alpine
    container_name: fhss-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fhss}
      POSTGRES_USER: ${POSTGRES_USER:-fhss}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fhss}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fhss-redis
    ports: []
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fhss-backend
    environment:
      <<: *common-vars
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?Set APP_JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGIN:-https://localhost}
    ports: []
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${SERVER_PORT:-8080}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: fhss-ml
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MODEL_PATH: ${MODEL_PATH:-/app/models/model_latest.joblib}
    ports: []
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ml-models:/app/models

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fhss-frontend
    environment:
      VITE_API_BASE_URL: ""
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: ${SERVER_PORT:-8080}
    ports: []
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: fhss-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN to your domain or IP in .env (e.g. example.com or http://1.2.3.4)}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${DOMAIN}}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  ml-models:
  caddy-data:
  caddy-config:
