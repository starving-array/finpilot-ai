databases:
  - name: finpilot-db
    databaseName: fhss
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: finpilot-backend
    runtime: docker
    repo: https://github.com/starving-array/finpilot-ai
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: finpilot-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: finpilot-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: finpilot-db
          property: password
      - key: DB_PASSWORD
        fromDatabase:
          name: finpilot-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        value: https://finpilot-ml-service.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://finpilot-frontend.onrender.com,https://finpilot-ai.vercel.app
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_DATA_REDIS_HOST
        sync: false
      - key: SPRING_DATA_REDIS_PORT
        value: "6379"

  - type: web
    name: finpilot-ml-service
    runtime: docker
    repo: https://github.com/starving-array/finpilot-ai
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: /app/models/model_latest.joblib
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"

  - type: web
    name: finpilot-frontend
    runtime: static
    repo: https://github.com/starving-array/finpilot-ai
    plan: free
    region: oregon
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://finpilot-backend.onrender.com/api/v1
      - key: VITE_API_PROXY_TARGET
        value: https://finpilot-backend.onrender.com
